<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tela 2 funcionario</title>
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Rationale&display=swap');


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rationale', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #ffffff 70%, #4682b4 100%);
            background-attachment: fixed;
        }

        .container-admin{
            width: 420px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 30px 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
        }

        .container-admin h1 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }

        .login-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            outline: none;
            font-size: 16px;
            color: black;
            padding: 0 45px 0 20px;
        }

        .login-box input::placeholder {
            color: #555;
        }

        .login-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .lembrete {
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }

        .lembrete label input {
            accent-color: green;
            margin-right: 5px;
        }

        .lembrete a {
            text-decoration: none;
            color: #333;
        }

        .lembrete a:hover {
            text-decoration: underline;
        }

        .botao {
            width: 100%;
            height: 45px;
            background: #5ebddc;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            transition: 0.3s;
        }

        .botao:hover {
            background: transparent;
            border: 2px solid #5ebddc;
        }
.logo {
            width: 700px; 
            height: auto;
            max-width: 90%;
            display: block;
            margin: 0 auto; 
        object-fit: cover; 
         display: block;;
          float: left; 
             
    }
     .nome{
            font-family: Georgia, serif;
            margin: 0; 
            line-height: 1;
        position: absolute;
            top: 75%;    /* Move para o meio vertical */
            left: 32%;   /* Move para o meio horizontal */
            transform: translate(-50%, -50%); 
          font-weight: bold;
            font-size: 50px; 
        color: rgb(78, 78, 230);
            
        }
    .cor-diferente {
            color: rgb(52, 217, 52);
        }
    .voltar{
         text-decoration: none;
        color:gray;
    }
    .baixo{
        font-family: "Quicksand", sans-serif;
        font-size: 12px;
        text-align: center;
        color: #86b4c4;
    }

    </style>
</head>
<body>
      <div>
        
        <img src="logo.PNG" alt="Logo do Sistema" class="logo">
     <h1 class= "nome">Valis<span class="cor-diferente">to</span>que</h1>
    </div>
    <main class="container-admin">
        <form action="">

    <a href="javascript:history.back()" class="voltar">&larr; Voltar para seleção</a>
            <h1>Acesso do Administrador</h1>
            
            <div class="login-box">
                <input type="email" placeholder="Email" required>
                <i class='bx bxs-user'></i>
            </div>
            
            <div class="login-box">
                <input type="password" placeholder="Senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="lembrete">
                <label><input type="checkbox">Lembrar senha</label>
                <a href="recuperasenha.html">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="botao">Confirmar</button>
         <p class="baixo">
              &copy; 2026 Valistoque. Todos os direitos reservados.
            </p>
        </form>
    </main>
</body>
</html>
