<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valistoque - Acesso Funcionário</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rationale&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rationale', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #ffffff 70%, #3CB371 100%);
            background-attachment: fixed;
        }

        .container-func {
            width: 420px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 30px 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
        }

        .container-func h1 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }

        .login-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            outline: none;
            font-size: 16px;
            color: black;
            padding: 0 45px 0 20px;
        }

        .login-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .lembrete {
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }

        .lembrete a {
            text-decoration: none;
            color: #333;
        }

        .botao {
            width: 100%;
            height: 45px;
            background: #00FF7F;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .botao:hover {
            background: transparent;
            border: 2px solid #00FF7F;
        }

        .logo {
            width: 700px; 
            max-width: 90%;
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            opacity: 0.8;
        }

        .nome {
            font-family: Georgia, serif;
            position: absolute;
            top: 75%;
            left: 32%;
            transform: translate(-50%, -50%); 
            font-weight: bold;
            font-size: 50px; 
            color: rgb(78, 78, 230);
        }

        .cor-diferente {
            color: rgb(52, 217, 52);
        }

        .voltar {
            text-decoration: none;
            color: gray;
            font-size: 14px;
        }

        .baixo {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #2e7d32;
        }
    </style>
</head>
<body>

    <div>
        <img src="logo.PNG" alt="Logo do Sistema" class="logo">
        <h1 class="nome">Valis<span class="cor-diferente">to</span>que</h1>
    </div>

    <main class="container-func">
        <form method="POST" action="processa_login.php">
            <input type="hidden" name="perfil" value="func">

            <a href="javascript:history.back()" class="voltar">&larr; Voltar para seleção</a>
            
            <h1>Acesso do Funcionário</h1>
            
            <div class="login-box">
                <input type="email" name="email" placeholder="Email" required>
                <i class='bx bxs-user'></i>
            </div>
            
            <div class="login-box">
                <input type="password" name="senha" placeholder="Senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="lembrete">
                <label><input type="checkbox" name="lembrar"> Lembrar senha</label>
                <a href="recuperasenha.html">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="botao">Confirmar</button>
            
            <p class="baixo">
                &copy; 2026 Valistoque. Todos os direitos reservados.
            </p>
        </form>
    </main>
</body>
</html>
