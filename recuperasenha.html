<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tela 2 funcionario</title>
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Rationale&display=swap');


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rationale', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #ffffff 70%, #708090 100%);
            background-attachment: fixed;
        }

        .recuperar{
            width: 420px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 30px 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
        }

        .recuperar h1 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 20px;
        }

        .recupera-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }

        .recupera-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            outline: none;
            font-size: 16px;
            color: black;
            padding: 0 45px 0 20px;
        }

        .recupera-box input::placeholder {
            color: #555;
        }

        .recupera-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }


        .botao {
            width: 100%;
            height: 45px;
            background: #778899;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            transition: 0.3s;
        }

        .botao:hover {
            background: transparent;
            border: 2px solid #778899;
        }
.logo {
            width: 700px; 
            height: auto;
            max-width: 90%;
            display: block;
            margin: 0 auto; 
        object-fit: cover; 
         display: block;;
          float: left; 
             
    }
     .nome{
            font-family: Georgia, serif;
            margin: 0; 
            line-height: 1;
        position: absolute;
            top: 75%;    /* Move para o meio vertical */
            left: 32%;   /* Move para o meio horizontal */
            transform: translate(-50%, -50%); 
          font-weight: bold;
            font-size: 50px; 
        color: rgb(78, 78, 230);
            
        }
    .cor-diferente {
            color: rgb(52, 217, 52);
        }
    .voltar{
         text-decoration: none;
        color:gray;
    }

    .baixo{
        font-family: "Quicksand", sans-serif;
        font-size: 12px;
        text-align: center;
        color: #bac0be;
    }

    </style>
</head>
<body>
      <div>
        
        <img src="logo.PNG" alt="Logo do Sistema" class="logo">
     <h1 class= "nome">Valis<span class="cor-diferente">to</span>que</h1>
    </div>
    <main class="recuperar">
        <form action="">

    <a href="javascript:history.back()" class="voltar">&larr; Voltar para seleção</a>
            <h1>Recuperar senha</h1>
            
            <div class="recupera-box">
                <input type="email" placeholder="Email" required>
                <i class='bx bxs-user'></i>
            </div>
            
             <div class="recupera-box">
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    <i class='bx bxs-id-card'></i>
                </div>

            <a href="codigo.html">
                <button type="submit" class="botao">Confirmar</button>
            </a>
            <p class="baixo">
              &copy; 2026 Valistoque. Todos os direitos reservados.
            </p>
        </form>
    </main>

    <script>
        const inputCpf = document.getElementById('cpf');

        inputCpf.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é número
            
            if (value.length > 11) value = value.slice(0, 11); // Limita a 11 números

            // Aplica a formatação
            value = value.replace(/(\+d{3})(\d)/, "$1.$2");
            value = value.replace(/^(\d{3})(\d)/, "$1.$2");
            value = value.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
            value = value.replace(/\.(\d{3})(\d)/, ".$1-$2");

            e.target.value = value;
        });
    </script>
</body>
</html>
